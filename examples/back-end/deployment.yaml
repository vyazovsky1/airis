apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: python-app
        image: example/backend-app:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "1500m"
            memory: "4Gi"
#            cpu: "250m"
#            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
