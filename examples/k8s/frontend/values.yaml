fullnameOverride: "guestbook-frontend"

replicaCount: 1

image:
  repository: nginx
  tag: "alpine"
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  nodePort: 30080  # Remove to let K8s assign automatically

# Must match backend chart's fullnameOverride
backend:
  host: "guestbook-backend"
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: guestbook.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

metrics:
  enabled: true
  image:
    repository: nginx/nginx-prometheus-exporter
    tag: "1.3.0"
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi
