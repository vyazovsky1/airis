apiVersion: v1
kind: Service
metadata:
  name: {{ include "guestbook-database.fullname" . }}
  labels:
    {{- include "guestbook-database.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: redis
      protocol: TCP
      name: redis
    {{- if .Values.metrics.enabled }}
    - port: 9121
      targetPort: metrics
      protocol: TCP
      name: metrics
    {{- end }}
  selector:
    {{- include "guestbook-database.selectorLabels" . | nindent 4 }}
