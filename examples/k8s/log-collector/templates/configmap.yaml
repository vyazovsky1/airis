apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "log-collector.fullname" . }}
  labels:
    {{- include "log-collector.labels" . | nindent 4 }}
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off
        # HTTP server for /api/v1/health and /api/v1/metrics
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    # Read container logs from every node
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        DB                {{ .Values.positionDB }}
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    # Enrich each log line with Kubernetes pod/namespace/label metadata
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    # Output — print enriched JSON to stdout (visible via kubectl logs)
    [OUTPUT]
        Name   stdout
        Match  *
        Format json_lines
