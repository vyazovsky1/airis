apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "log-collector.fullname" . }}
  labels:
    {{- include "log-collector.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "log-collector.selectorLabels" . | nindent 6 }}
  # DaemonSet update strategy: replace pods one at a time (zero downtime)
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        {{- include "log-collector.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ if .Values.rbac.create }}{{ include "log-collector.fullname" . }}{{ else }}default{{ end }}
      # DaemonSet pods run on EVERY node — tolerations let them land on
      # control-plane nodes too (normally tainted to repel workloads)
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: fluent-bit
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 2020
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
              readOnly: true
            # Read container log files from the node's filesystem
            - name: varlog
              mountPath: /var/log
              readOnly: true
            # Fluent Bit tail position DB lives on the node so progress
            # survives pod restarts — stored outside /var/log to avoid
            # polluting the log directory
            - name: flbdb
              mountPath: /var/flbdb

      volumes:
        - name: config
          configMap:
            name: {{ include "log-collector.fullname" . }}
        # hostPath volumes give the pod access to the node's own filesystem
        - name: varlog
          hostPath:
            path: /var/log
        - name: flbdb
          hostPath:
            path: /var/flbdb
            type: DirectoryOrCreate
